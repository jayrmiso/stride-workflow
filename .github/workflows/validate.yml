name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run check
      - run: npm run smoke
      - run: npm pack --dry-run
      - name: Install smoke test
        run: |
          tmp="$(mktemp -d)"
          node bin/stride-workflow.js init "$tmp"
          node bin/stride-workflow.js doctor "$tmp"

